name: Build and deploy WAR app to Linux VM (Tomcat 9)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean package

      - uses: actions/upload-artifact@v4
        with:
          name: war
          path: target/*.war

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: war

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy WAR to Tomcat
        run: |
          scp *.war ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:${{ secrets.TOMCAT_WEBAPPS }}/ROOT.war

      - name: Restart Tomcat
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "sudo systemctl restart tomcat"
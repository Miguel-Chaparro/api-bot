name: Build and deploy WAR app to Linux VM (Tomcat 9)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Create Firebase Credentials
        run: |
            mkdir -p src/main/resources
            echo "${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}" | base64 -d > src/main/resources/firebase-credentials.json

      - name: Build with Maven
        run: mvn -B clean package

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: war
          path: target/*.war
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: war

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          cat <<EOF > ~/.ssh/id_ed25519
          ${{ secrets.VM_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Upload WAR to /tmp
        run: |
          scp *.war ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/tmp/app.war

      - name: Deploy WAR with sudo and restart Tomcat
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "
            sudo mv /tmp/app.war /opt/tomcat/webapps/ROOT.war &&
            sudo systemctl restart tomcat
          "
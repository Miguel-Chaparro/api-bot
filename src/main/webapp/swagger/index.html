<!-- HTML for static distribution bundle build -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Documentación API - DommyBot</title>
    <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="favicon-16x16.png" sizes="16x16" />
    <link rel="stylesheet" type="text/css" href="swagger-ui.css" >
    <link rel="stylesheet" type="text/css" href="index.css" >
    <style>
      /* Ocultar la barra de input de URL (explorer) y el botón Explore */
      .topbar .download-url-wrapper,
      .topbar .download-url-wrapper *,
      .topbar .topbar-wrapper input[placeholder="URL"] {
        display: none !important;
      }
      /* Cambiar color de fondo de la topbar */
      .topbar {
        background: rgb(183 116 17 / 30%) !important;
      }
      /* Ocultar el logo SVG original de Swagger */
      .topbar-wrapper .link svg {
        display: none !important;
      }
      /* Mostrar el logo PNG personalizado en la cabecera con nuevo tamaño */
      .topbar-wrapper .link::before {
        content: "";
        display: inline-block;
        vertical-align: middle;
        width: 250px;   /* Nuevo tamaño del logo */
        height: 100px;
        background: url('logo.png') no-repeat center center;
        background-size: contain;
        margin-right: 10px;
      }
      /* Personalizar el texto */
      .topbar-wrapper .link span {
        font-size: 1.5em;
        font-weight: bold;
        color: #1976d2;
      }
      .topbar-wrapper .link img {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <div id="swagger-ui"></div>
    <script src="swagger-ui-bundle.js" charset="UTF-8"> </script>
    <script src="swagger-ui-standalone-preset.js" charset="UTF-8"> </script>
    <script src="swagger-initializer.js" charset="UTF-8"> </script>
    <script>
      // Cambiar el texto del logo
      window.onload = function() {
        setTimeout(function() {
          var logo = document.querySelector('.topbar-wrapper .link span');
          if (logo) {
            logo.textContent = 'Documentación API - DomyBot';
          }
          // Personalizar el encabezado de los tags (paths)
          document.querySelectorAll('.opblock-tag-section .opblock-tag > div').forEach(function(tagDiv) {
            if (tagDiv.textContent.trim() === 'default') {
              tagDiv.textContent = 'DommyBot API'; // Cambia aquí el texto a mostrar
            }
          });
        }, 500);
      };
    </script>
  </body>
</html>
